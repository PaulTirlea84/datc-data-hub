site_name: DATC Data Hub
site_description: Learning paths and competency frameworks for the DATC Data Platform (DEVI)
site_author: DATC Data Platform Team

theme:
  name: material
  custom_dir: overrides
  logo: assets/accenture-logo.png
  favicon: assets/accenture-favicon.ico
  palette:
    primary: deep purple
    accent: deep purple
  font:
    text: Roboto
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.expand
    - toc.integrate
    - search.suggest
    - search.highlight

extra_css:
  - stylesheets/accenture.css

plugins:
  - search

markdown_extensions:
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - tables
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Domains:
    - domains/index.md
    - Data Engineering: domains/data-engineering/index.md
    - Data Analytics: domains/data-analytics/index.md
  - AI Competency:
    - ai-competency/index.md
    - AI Data Engineering: ai-competency/data-engineering.md
    - AI Data Analytics: ai-competency/data-analytics.md
  - Curriculum: curriculum/index.md
  - Assets: assets/index.md
  - Sandbox: working/sandbox.md

extra:
  generator: false

copyright: "&copy; Copyright © 2026 Accenture. All rights reserved."
